services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    # Kein Host-Port: Backend ist nur intern im Docker-Netz erreichbar (frontend-nginx proxyt → backend:4000).
    expose:
      - "4000"
    volumes:
      - uploads:/app/backend/uploads
    shm_size: "1gb"
    mem_limit: "3g"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    # Host-Port kommt aus docker-compose.prod.yml (80 bzw. 8080 hinter Caddy).
    expose:
      - "80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  uploads:
