server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /upload {
        proxy_pass http://backend:4000;
        client_max_body_size 1G;
        proxy_read_timeout 600s;
    }

    location /transcribe {
        proxy_pass http://backend:4000;
        proxy_read_timeout 300s;
    }

    location /analyze {
        proxy_pass http://backend:4000;
    }

    location /render {
        proxy_pass http://backend:4000;
        proxy_read_timeout 600s;
    }

    location /uploads {
        proxy_pass http://backend:4000;
    }

    location /jobs {
        proxy_pass http://backend:4000;
    }
}
